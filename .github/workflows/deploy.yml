name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # Explicit deny semua yang tidak dibutuhkan
  actions: none
  checks: none
  discussions: none
  issues: none
  packages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare public files (exclude internal)
        run: |
          mkdir -p /tmp/deploy
          rsync -a \
            --exclude='agent-prompts/' \
            --exclude='docs/' \
            --exclude='tools/' \
            --exclude='data/vocab-n4.js' \
            --exclude='_MAP.md' \
            --exclude='_MAP-ARCHIVE.md' \
            --exclude='AGENT-COMMON.md' \
            --exclude='AGENT-RATE-LIMIT-LOG.md' \
            --exclude='MASTER-FLOW-*.md' \
            --exclude='MERGE-SUMMARY.md' \
            --exclude='CRUNCHY-NOTIFICATION-*.md' \
            --exclude='.github/' \
            --exclude='SESSION-RECAP-*.txt' \
            --exclude='INTEGRATOR-BRIEFING.md' \
            --exclude='VISION.md' \
            --exclude='ROADMAP.md' \
            --exclude='AGENT-PROMPTS.md' \
            . /tmp/deploy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '/tmp/deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
