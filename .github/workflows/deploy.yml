name: Deploy → Cloudflare Pages

on:
  push:
    branches: [main]      # production deploy: hanya dari main
  workflow_dispatch:       # manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to nugget-nihongo.pages.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Merge vocab category files
        run: node scripts/merge-vocab.js

      - name: Merge grammar category files
        run: node scripts/merge-grammar.js

      - name: Validate merged output
        run: node tests/run.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy public --project-name=nugget-nihongo --branch=main

      - name: Confirm live URL
        run: echo "✅ Live at https://nugget-nihongo.pages.dev"
