name: Apply Supabase Schema (Phase 5.5)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    name: Apply Phase 5.5 schema to Supabase
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/frontend-overhaul

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Diagnose + Apply
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 - << 'PYEOF' 2>&1 | tee /tmp/output.txt
          import os, socket, psycopg2, time, sys

          pw = os.environ['SUPABASE_DB_PASSWORD']
          project = 'oxeuwkpgrtojjzhcboqz'

          print(f'Password length: {len(pw)}')

          # DNS resolution test
          hosts_to_test = [
              ('aws-0-ap-southeast-1.pooler.supabase.com', 5432),
              ('aws-0-ap-southeast-1.pooler.supabase.com', 6543),
              (f'db.{project}.supabase.co', 5432),
          ]
          for host, port in hosts_to_test:
              try:
                  infos = socket.getaddrinfo(host, port)
                  ipv4s = [i[4][0] for i in infos if i[0]==socket.AF_INET]
                  ipv6s = [i[4][0] for i in infos if i[0]==socket.AF_INET6]
                  print(f'DNS {host}:{port} IPv4={ipv4s} IPv6={ipv6s[:1]}')
              except Exception as e:
                  print(f'DNS {host}:{port} ERROR: {e}')

          # Connection attempts
          options = [
              {'host': 'aws-0-ap-southeast-1.pooler.supabase.com', 'port': 5432, 'user': f'postgres.{project}'},
              {'host': 'aws-0-ap-southeast-1.pooler.supabase.com', 'port': 6543, 'user': f'postgres.{project}'},
              {'host': f'db.{project}.supabase.co', 'port': 5432, 'user': 'postgres'},
          ]
          # Add resolved IPv4 addresses
          for host, port in hosts_to_test[:2]:
              try:
                  infos = socket.getaddrinfo(host, port, socket.AF_INET)
                  if infos:
                      ip = infos[0][4][0]
                      user = f'postgres.{project}'
                      options.insert(0, {'host': ip, 'port': port, 'user': user, 'label': f'{host} via {ip}'})
              except: pass

          conn = None
          for opt in options:
              label = opt.get('label', f"{opt['host']}:{opt['port']}")
              try:
                  print(f'Trying {label} as {opt["user"]}...')
                  conn = psycopg2.connect(
                      host=opt['host'], port=opt['port'],
                      dbname='postgres', user=opt['user'],
                      password=pw, connect_timeout=15, sslmode='require')
                  print(f'CONNECTED to {label}! server={conn.server_version}')
                  break
              except Exception as e:
                  print(f'  FAIL: {e}')

          if conn is None:
              print('ALL CONNECTIONS FAILED')
              sys.exit(1)

          # Apply schema
          with open('supabase/schema.sql') as f:
              content = f.read()
          # Find Phase 5.5 section
          import re
          idx = content.find('AI FEEDBACK (Phase 5.5b')
          if idx == -1:
              print('MARKER NOT FOUND')
              sys.exit(1)
          start = content.rfind('--', 0, idx)
          sql = content[start:].strip()
          print(f'SQL length: {len(sql)} chars')

          conn.autocommit = True
          cur = conn.cursor()
          ok = err = skip = 0
          for stmt in re.split(r';\s*\n', sql):
              s = stmt.strip()
              if not s or s.startswith('--'): continue
              try:
                  cur.execute(s)
                  ok += 1
              except psycopg2.errors.DuplicateTable:
                  skip += 1
              except psycopg2.errors.DuplicateObject:
                  skip += 1
              except Exception as e:
                  print(f'ERR: {type(e).__name__}: {e} | {s[:60]}')
                  err += 1

          print(f'Done: {ok} OK, {skip} skipped (already exist), {err} errors')
          cur.execute("SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename LIKE 'ai_%' ORDER BY tablename")
          print('Tables:', [r[0] for r in cur.fetchall()])
          conn.close()
          if err > 0:
              sys.exit(1)
          PYEOF
          EXIT=$?
          echo "Script exit: $EXIT"
          exit $EXIT

      - name: Save output to repo
        if: always()
        run: |
          git config user.email "ci@nugget-nihongo"
          git config user.name "CI"
          cp /tmp/output.txt .github/schema-apply-output.txt 2>/dev/null || echo "no output" > .github/schema-apply-output.txt
          git add .github/schema-apply-output.txt
          git diff --staged --quiet || git commit -m "ci: schema apply diagnostic output"
          git push origin HEAD:develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
