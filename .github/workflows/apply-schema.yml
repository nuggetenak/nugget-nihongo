name: Apply Supabase Schema (Phase 5.5)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/frontend-overhaul
      - run: pip install psycopg2-binary
      - name: Apply schema
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import os, socket, psycopg2, re, sys, time

          pw = os.environ['SUPABASE_DB_PASSWORD']
          project = 'oxeuwkpgrtojjzhcboqz'
          pooler  = 'aws-0-ap-southeast-1.pooler.supabase.com'
          user    = f'postgres.{project}'

          # Build candidate list: try both direct IP (IPv4) and hostname
          candidates = []
          for port in [5432, 6543]:
              # Resolve to IPv4 first
              try:
                  infos = socket.getaddrinfo(pooler, port, socket.AF_INET)
                  for info in infos:
                      ip = info[4][0]
                      candidates.append({'host': ip, 'port': port, 'user': user,
                                         'label': f'{pooler}({ip}):{port}'})
              except Exception as e:
                  print(f'DNS {pooler}:{port} → {e}')
              # Also try by hostname
              candidates.append({'host': pooler, 'port': port, 'user': user,
                                 'label': f'{pooler}:{port}'})
          # Direct db fallback
          candidates.append({'host': f'db.{project}.supabase.co', 'port': 5432,
                             'user': 'postgres', 'label': 'direct'})

          conn = None
          for c in candidates:
              try:
                  print(f'Trying {c["label"]} ...')
                  conn = psycopg2.connect(
                      host=c['host'], port=c['port'], dbname='postgres',
                      user=c['user'], password=pw,
                      connect_timeout=15, sslmode='require')
                  print(f'  OK — server {conn.server_version}')
                  break
              except Exception as e:
                  print(f'  FAIL: {e}')
                  time.sleep(0.5)

          if not conn:
              print('ALL CONNECTIONS FAILED')
              sys.exit(1)

          conn.autocommit = True
          cur = conn.cursor()

          # What tables exist?
          cur.execute("SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename LIKE 'ai_%' ORDER BY tablename")
          existing = {r[0] for r in cur.fetchall()}
          print('Existing:', sorted(existing))

          REQUIRED = {'ai_feedback', 'ai_quiz_cache', 'ai_promotion_queue'}
          missing  = REQUIRED - existing
          if not missing:
              print('All required tables already exist — nothing to do.')
              conn.close(); sys.exit(0)

          print('Missing:', missing, '— applying schema...')
          with open('supabase/schema.sql') as f:
              content = f.read()
          idx   = content.find('AI FEEDBACK (Phase 5.5b')
          start = content.rfind('--', 0, idx)
          sql   = content[start:].strip()
          print(f'SQL: {len(sql)} chars')

          ok = skip = err = 0
          for stmt in re.split(r';\s*\n', sql):
              s = stmt.strip()
              if not s or s.startswith('--'): continue
              try:
                  cur.execute(s)
                  ok += 1
              except psycopg2.Error as e:
                  code = getattr(e, 'pgcode', '')
                  if code in ('42P07','42710','23505') or 'already exists' in str(e):
                      skip += 1
                  else:
                      print(f'  ERR {code}: {str(e)[:120]} | {s[:60]}')
                      err += 1

          cur.execute("SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename LIKE 'ai_%' ORDER BY tablename")
          final = {r[0] for r in cur.fetchall()}
          print(f'After: {sorted(final)} | ok={ok} skip={skip} err={err}')
          conn.close()

          still_missing = REQUIRED - final
          if still_missing:
              print('STILL MISSING:', still_missing)
              sys.exit(1)
          print('SUCCESS — all tables created.')
          PYEOF
