name: Apply Supabase Schema (Phase 5.5)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    name: Apply Phase 5.5 schema to Supabase
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/frontend-overhaul

      - name: Install psql + dnsutils
        run: sudo apt-get install -y postgresql-client dnsutils

      - name: Extract Phase 5.5 SQL
        run: |
          python3 - << 'PYEOF'
          with open('supabase/schema.sql') as f:
              content = f.read()
          start = content.find('-- ── AI FEEDBACK (Phase 5.5b')
          if start == -1:
              raise RuntimeError("Phase 5.5 markers not found")
          sql = content[start:].strip()
          print(f"Extracted {len(sql)} chars")
          with open('/tmp/phase55.sql', 'w') as f:
              f.write(sql)
          PYEOF

      - name: Resolve Supabase IPv4 + apply schema
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Force IPv4: resolve the hostname to IPv4 address
          DB_HOST="db.oxeuwkpgrtojjzhcboqz.supabase.co"
          IPV4=$(dig +short -4 A "$DB_HOST" | head -1)
          echo "Resolved $DB_HOST → $IPV4"

          if [ -z "$IPV4" ]; then
            echo "IPv4 resolution failed, trying session pooler..."
            IPV4=$(dig +short -4 A "aws-0-ap-southeast-1.pooler.supabase.com" | head -1)
            PGUSER="postgres.oxeuwkpgrtojjzhcboqz"
            echo "Pooler IPv4: $IPV4"
          else
            PGUSER="postgres"
          fi

          if [ -z "$IPV4" ]; then
            echo "ERROR: could not resolve any IPv4 address"
            exit 1
          fi

          echo "Connecting via $IPV4 as $PGUSER..."
          PGCONNECT="host=$IPV4 port=5432 dbname=postgres user=$PGUSER sslmode=require"

          psql "$PGCONNECT" -f /tmp/phase55.sql --echo-errors 2>&1
          echo "psql exit: $?"

      - name: Verify tables
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          DB_HOST="db.oxeuwkpgrtojjzhcboqz.supabase.co"
          IPV4=$(dig +short -4 A "$DB_HOST" | head -1)
          [ -z "$IPV4" ] && IPV4=$(dig +short -4 A "aws-0-ap-southeast-1.pooler.supabase.com" | head -1)
          PGUSER=$( [ "$IPV4" = "$(dig +short -4 A "$DB_HOST" | head -1)" ] && echo "postgres" || echo "postgres.oxeuwkpgrtojjzhcboqz" )

          echo "Checking created tables..."
          psql "host=$IPV4 port=5432 dbname=postgres user=postgres sslmode=require" \
            -c "SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename LIKE 'ai_%' ORDER BY tablename;" 2>&1
