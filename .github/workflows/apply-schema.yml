name: Apply Supabase Schema (Phase 5.5)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    name: Apply Phase 5.5 schema to Supabase
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/frontend-overhaul

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Extract Phase 5.5 SQL
        run: |
          python3 - << 'PYEOF'
          with open('supabase/schema.sql') as f:
              content = f.read()
          start = content.find('-- \u2500\u2500 AI FEEDBACK (Phase 5.5b')
          if start == -1:
              raise RuntimeError("Phase 5.5 marker not found in schema.sql")
          sql = content[start:].strip()
          print(f"Extracted {len(sql)} chars")
          with open('/tmp/phase55.sql', 'w') as f:
              f.write(sql)
          PYEOF

      - name: Apply schema via Session Pooler (IPv4)
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Session pooler (port 5432) supports DDL and resolves to IPv4
          # User format: postgres.{project_ref}
          POOLER="aws-0-ap-southeast-1.pooler.supabase.com"
          PROJECT="oxeuwkpgrtojjzhcboqz"
          PGUSER="postgres.${PROJECT}"

          echo "Resolving pooler IPv4..."
          IPV4=$(python3 -c "
          import socket
          results = socket.getaddrinfo('$POOLER', 5432, socket.AF_INET)
          print(results[0][4][0])
          " 2>/dev/null || echo "")
          echo "Pooler IPv4: $IPV4"

          if [ -z "$IPV4" ]; then
            echo "Using hostname directly (may use IPv6)"
            CONN="host=$POOLER port=5432 dbname=postgres user=$PGUSER sslmode=require"
          else
            CONN="host=$IPV4 port=5432 dbname=postgres user=$PGUSER sslmode=require"
          fi

          echo "Applying schema..."
          psql "$CONN" -f /tmp/phase55.sql 2>&1
          EXIT=$?
          echo "psql exit code: $EXIT"
          exit $EXIT

      - name: Verify tables exist
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          POOLER="aws-0-ap-southeast-1.pooler.supabase.com"
          PROJECT="oxeuwkpgrtojjzhcboqz"
          PGUSER="postgres.${PROJECT}"
          IPV4=$(python3 -c "
          import socket
          try:
              r = socket.getaddrinfo('$POOLER', 5432, socket.AF_INET)
              print(r[0][4][0])
          except: print('')
          " 2>/dev/null || echo "")
          HOST=${IPV4:-$POOLER}
          CONN="host=$HOST port=5432 dbname=postgres user=$PGUSER sslmode=require"

          echo "Tables created:"
          psql "$CONN" -c "SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename LIKE 'ai_%' ORDER BY tablename;" 2>&1
