name: Apply Supabase Schema (Phase 5.5)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    name: Apply Phase 5.5 schema to Supabase
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/frontend-overhaul

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Extract and apply Phase 5.5 schema
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import os, psycopg2, time

          # Read SQL
          with open('supabase/schema.sql') as f:
              content = f.read()

          # Find Phase 5.5 additions
          marker = '-- \u2500\u2500 AI FEEDBACK (Phase 5.5b'
          start = content.find(marker)
          if start == -1:
              # Try ASCII fallback
              marker2 = 'AI FEEDBACK (Phase 5.5b'
              start = content.find(marker2)
              if start != -1:
                  start = content.rfind('--', 0, start)
          if start == -1:
              raise RuntimeError('Phase 5.5 marker not found')

          sql = content[start:].strip()
          print(f'Extracted {len(sql)} chars of Phase 5.5 SQL')

          password = os.environ['SUPABASE_DB_PASSWORD']
          project = 'oxeuwkpgrtojjzhcboqz'

          # Try connection options in order
          options = [
              # Session pooler (IPv4, supports DDL)
              {'host': f'aws-0-ap-southeast-1.pooler.supabase.com',
               'port': 5432, 'user': f'postgres.{project}'},
              # Direct (may be IPv6 but try anyway)
              {'host': f'db.{project}.supabase.co',
               'port': 5432, 'user': 'postgres'},
              # Try other pooler regions
              {'host': 'aws-0-us-east-1.pooler.supabase.com',
               'port': 5432, 'user': f'postgres.{project}'},
          ]

          conn = None
          for opt in options:
              try:
                  print(f"Trying {opt['host']}:{opt['port']} as {opt['user']}...")
                  conn = psycopg2.connect(
                      host=opt['host'], port=opt['port'],
                      dbname='postgres', user=opt['user'],
                      password=password, connect_timeout=20,
                      sslmode='require',
                  )
                  print(f"Connected! server={conn.server_version}")
                  break
              except Exception as e:
                  print(f"  Failed: {e}")
                  time.sleep(1)

          if conn is None:
              raise RuntimeError('All connection attempts failed')

          conn.autocommit = True
          cur = conn.cursor()

          # Split into individual statements and execute one by one
          # (some statements span multiple lines)
          import re
          # Split on semicolons that end a statement
          statements = []
          current = []
          for line in sql.split('\n'):
              stripped = line.strip()
              if stripped.startswith('--'):
                  continue  # skip comments for execution (keep for splitting logic)
              current.append(line)
              if stripped.endswith(';') and not stripped.startswith('--'):
                  stmt = '\n'.join(current).strip()
                  if len(stmt) > 5:
                      statements.append(stmt)
                  current = []

          # Also try as one big block
          print(f'\nExecuting {len(statements)} statements...')
          errors = 0
          for i, stmt in enumerate(statements):
              preview = stmt[:60].replace('\n', ' ')
              try:
                  cur.execute(stmt)
                  print(f'  OK [{i+1}/{len(statements)}]: {preview}')
              except psycopg2.Error as e:
                  if 'already exists' in str(e) or 'DuplicateObject' in type(e).__name__:
                      print(f'  SKIP [{i+1}] (already exists): {preview}')
                  else:
                      print(f'  ERROR [{i+1}]: {e} | stmt: {preview}')
                      errors += 1

          conn.close()
          print(f'\nDone. {errors} errors.')
          if errors > 0:
              exit(1)
          PYEOF

      - name: Verify tables
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import os, psycopg2
          pw = os.environ['SUPABASE_DB_PASSWORD']
          project = 'oxeuwkpgrtojjzhcboqz'
          opts = [
              {'host': 'aws-0-ap-southeast-1.pooler.supabase.com', 'port': 5432, 'user': f'postgres.{project}'},
              {'host': f'db.{project}.supabase.co', 'port': 5432, 'user': 'postgres'},
          ]
          conn = None
          for o in opts:
              try:
                  conn = psycopg2.connect(host=o['host'], port=o['port'],
                    dbname='postgres', user=o['user'], password=pw,
                    connect_timeout=15, sslmode='require')
                  break
              except: pass
          if not conn: raise RuntimeError('Cannot connect for verification')
          cur = conn.cursor()
          cur.execute("SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename LIKE 'ai_%' ORDER BY tablename")
          tables = [r[0] for r in cur.fetchall()]
          print('Tables in public schema (ai_*):', tables)
          required = ['ai_feedback', 'ai_promotion_queue', 'ai_quiz_cache']
          missing = [t for t in required if t not in tables]
          if missing:
              print('MISSING:', missing)
              exit(1)
          else:
              print('All required tables present!')
          conn.close()
          PYEOF
