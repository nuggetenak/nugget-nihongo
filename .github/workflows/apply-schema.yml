name: Apply Supabase Schema (Phase 5.5)
on:
  workflow_dispatch:
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/frontend-overhaul

      - name: Debug environment
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== ENV CHECK ==="
          echo "Token length: ${#SUPABASE_ACCESS_TOKEN}"
          echo "Token prefix: ${SUPABASE_ACCESS_TOKEN:0:12}"
          echo "Script exists: $(test -f .github/apply_schema.py && echo YES || echo NO)"
          echo "Python version: $(python3 --version)"
          echo ""
          echo "=== API TEST ==="
          curl -s --max-time 15 \
            -X POST "https://api.supabase.com/v1/projects/oxeuwkpgrtojjzhcboqz/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"' AND tablename LIKE '"'"'ai_%'"'"' ORDER BY tablename"}' \
            -w "\nHTTP_STATUS:%{http_code}"

      - name: Apply schema
        if: success()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/apply_schema.py
