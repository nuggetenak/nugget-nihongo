name: Validate (develop & PR)

on:
  push:
    branches: [develop, 'feature/**', 'fix/**', 'patch/**']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Run tests + checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run test suite
        run: node tests/run.js

      - name: Check version sync (sw.js vs version.js)
        run: |
          node -e "
            const fs = require('fs');
            const sw = fs.readFileSync('public/sw.js', 'utf8');
            const v  = fs.readFileSync('public/js/core/version.js', 'utf8');
            const swV  = sw.match(/CACHE = 'nihongo-(v[\d.]+)'/)?.[1];
            const appV = v.match(/APP_VERSION = '(v[\d.]+)'/)?.[1];
            if (swV !== appV) {
              console.error('VERSION MISMATCH: sw=' + swV + ' app=' + appV);
              process.exit(1);
            }
            console.log('Version sync OK: ' + appV);
          "

      - name: Summary
        run: echo "All checks passed. Safe to merge to main."
