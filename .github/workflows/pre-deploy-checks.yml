name: Pre-deploy Checks

on:
  push:
    branches: [main]
    paths: ['public/**']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Verify public/ structure
        run: |
          echo "Checking required files..."
          for f in public/index.html public/sw.js public/manifest.webmanifest \
                   public/js/core/version.js public/styles/app.css; do
            if [ ! -f "$f" ]; then echo "MISSING: $f"; exit 1; fi
          done
          echo "✅ All required files present"

      - name: Check no internal files in public/
        run: |
          if find public/ -name '_MAP*' -o -name 'AGENT-*' -o -name '*.env' | grep -q .; then
            echo "❌ Internal files found in public/"
            find public/ -name '_MAP*' -o -name 'AGENT-*' -o -name '*.env'
            exit 1
          fi
          echo "✅ No internal files in public/"
